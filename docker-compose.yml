services:
  db:
    image: mariadb:11
    container_name: enoteb-db
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: enoteb
      MYSQL_USER: enoteb
      MYSQL_PASSWORD: enoteb
    volumes:
      - enoteb_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  enoteb_mysql_data:
